# Bij push naar `main`: eerst checks op GitHub-hosted, daarna build + deploy op je self-hosted runner.
#
# Self-hosted runner (labels: self-hosted, Linux, X64) — de job draait op de server waar Docker draait.
# SSH vanuit Actions is niet nodig; git-clone/pull doet de runner zelf via checkout.
#
# Standaard wordt .env gekopieerd van /home/sjoerd/lunchkraam/.env op de runner-host.
# Optioneel: repository variable LUNCHKRAAM_ENV_FILE overschrijft dat pad.
#
# Op de runner-host: Docker + docker compose; gebruiker die de runner draait kan `docker` aanroepen (groep `docker`).

name: CI and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go static checks and compile
        run: |
          go vet ./...
          go build -trimpath -ldflags="-s -w" -o /tmp/lunchkraam-server ./cmd/server

      - name: Verify production Docker image builds
        run: docker build -t lunchkraam:ci .

  deploy:
    needs: verify
    runs-on: [self-hosted, Linux, X64]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Copy production .env
        run: |
          set -euo pipefail
          DEFAULT="/home/sjoerd/lunchkraam/.env"
          VARS_JSON='${{ toJSON(vars) }}'
          OVERRIDE="$(python3 -c "import json,sys; print(json.loads(sys.argv[1]).get('LUNCHKRAAM_ENV_FILE') or '')" "$VARS_JSON")"
          if [ -n "$OVERRIDE" ]; then
            SRC="$OVERRIDE"
          else
            SRC="$DEFAULT"
          fi
          if [ ! -f "$SRC" ]; then
            echo "Env file not found: $SRC (set LUNCHKRAAM_ENV_FILE or place .env at $DEFAULT)" >&2
            exit 1
          fi
          cp "$SRC" .env

      - name: Build and start stack
        run: DOCKER_UID="$(id -u)" DOCKER_GID="$(id -g)" APP_VERSION="${GITHUB_SHA::7}" docker compose up -d --build
